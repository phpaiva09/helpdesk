<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Chamados | Help Desk</title>
    <link rel="stylesheet" href="./styles/meus-chamados-tecnico.css">
</head>
<body>

    <header class="navbar">
        <h1>HelpDesk</h1>

        <nav>
            <a href="pagecliente.html">Início</a>
            <a href="meus-chamados-cliente.html">Meus Chamados</a>
            <a href="minhacontacliente.html">Conta</a>
            <a href="#" onclick="sair()">Sair</a>
        </nav>
    </header>

    <main class="container">
        <section class="tecnicos-section">
            <h2>Meus chamados</h2>

            <div class="cards-tecnicos" id="lista-meus-chamados-cliente"></div>
        </section>
    </main>

    <div id="modal-curriculo">
        <div class="curriculo-content">
            <button class="fechar-curriculo" onclick="fecharCurriculo()">×</button>

            <h2 id="curriculo-nome"></h2>
            <p id="curriculo-area"></p>

            <hr>

            <h3>Formação</h3>
            <p id="curriculo-formacao"></p>

            <h3>Experiência</h3>
            <p id="curriculo-experiencia"></p>

            <h3>Resumo profissional</h3>
            <p id="curriculo-resumo"></p>

            <h3>Contato</h3>
            <p id="curriculo-email"></p>
            <p id="curriculo-telefone"></p>
        </div>
    </div>

    <div id="modal-avaliacao" class="modal">
        <div class="modal-content">
            <h3 id="titulo-avaliacao">Avaliar atendimento</h3>

            <p id="texto-avaliacao"></p>

            <textarea id="comentario-avaliacao" placeholder="Descreva como foi o atendimento ou o motivo"></textarea>

            <select id="nota-avaliacao">
                <option value="">Selecione uma nota</option>
                <option value="1">1 estrela</option>
                <option value="2">2 estrelas</option>
                <option value="3">3 estrelas</option>
                <option value="4">4 estrelas</option>
                <option value="5">5 estrelas</option>
            </select>

            <button onclick="enviarAvaliacao()">Enviar avaliação</button>
            <button onclick="pularAvaliacao()">Pular</button>
        </div>
    </div>

    <script>
        window.addEventListener("load", () => {
            document.body.classList.add("loaded");
        });
    </script>

    <script src="script.js"></script>
</body>
</html>
